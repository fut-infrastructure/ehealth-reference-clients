name: docker

on:
  push:
    tags:
      - 'v*'

# write:packages is required to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Docker Login to GHCR
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push clinician-client
        run: |
          docker build \
            --platform linux/amd64 \
            -f clinician-client/Dockerfile \
            -t ghcr.io/fut-infrastructure/clinician-client:${{ steps.version.outputs.version }} \
            -t ghcr.io/fut-infrastructure/clinician-client:latest \
            .
          docker push ghcr.io/fut-infrastructure/clinician-client:${{ steps.version.outputs.version }}
          docker push ghcr.io/fut-infrastructure/clinician-client:latest

      - name: Build and push citizen-client
        run: |
          docker build \
            --platform linux/amd64 \
            -f citizen-client/Dockerfile \
            -t ghcr.io/fut-infrastructure/citizen-client:${{ steps.version.outputs.version }} \
            -t ghcr.io/fut-infrastructure/citizen-client:latest \
            .
          docker push ghcr.io/fut-infrastructure/citizen-client:${{ steps.version.outputs.version }}
          docker push ghcr.io/fut-infrastructure/citizen-client:latest
