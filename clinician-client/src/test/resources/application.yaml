# Test-scope configuration for CreatePatientIT.
#
# Any value here can be overridden at runtime by the matching EHEALTH_TEST_* env var.
# Username and password must be supplied via EHEALTH_TEST_USERNAME / EHEALTH_TEST_PASSWORD
# (or EHEALTH_TEST_BEARER_TOKEN to skip the ROPC fetch entirely).
ehealth:
  test:
    patient-base-url: https://patient.devenvcgi.ehealth.sundhed.dk/fhir
    token-url: https://saml.devenvcgi.ehealth.sundhed.dk/auth/realms/ehealth/protocol/openid-connect/token
    client-id: ehealth-reference-clinician-client
    scope: openid practitioner
    cpr: '0501792275'
    username:
    password:
