<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">
<head>
    <title>Create care plan</title>
    <style>
        .pd-list {
            border-collapse: collapse;
            width: 100%;
            margin: 0.75rem 0;
        }

        .pd-list th {
            text-align: left;
            border-bottom: 2px solid #ccc;
            padding: 0.4rem 0.6rem;
        }

        .pd-list td {
            padding: 0.35rem 0.6rem;
            vertical-align: top;
            border-bottom: 1px solid #eee;
        }

        .pd-list tr:hover td {
            background: #f5f5f5;
        }

        .pd-actions {
            color: #555;
            font-size: 0.875rem;
        }

        .pd-actions li {
            margin: 0.1rem 0;
        }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .search-bar input[type=text] {
            flex: 1;
            min-width: 12rem;
        }
    </style>
</head>
<body>
<main layout:fragment="content">
    <h2>Create care plan</h2>

    <p>Pick a published plan definition to apply to this episode of care. The server will create a
        draft care plan and its activities.</p>

    <form method="get" th:action="@{/episodes/{id}/care-plans/new(id=${episodeOfCareId})}">
        <div class="search-bar">
            <input type="text" name="search" th:value="${search}" placeholder="Search by title..."/>
            <label>
                <input type="checkbox" name="withActivities" value="true" th:checked="${withActivities}"/>
                Only plans with activities
            </label>
            <button type="submit">Search</button>
        </div>
    </form>

    <form th:action="@{/episodes/{id}/care-plans(id=${episodeOfCareId})}" method="post"
          th:unless="${planDefinitions.isEmpty()}">
        <table class="pd-list">
            <thead>
            <tr>
                <th style="width:1.5rem;"></th>
                <th>Plan definition</th>
                <th>Created</th>
                <th>Activities</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="planDefinition, iter : ${planDefinitions}">
                <td>
                    <input type="radio" name="planDefinitionId" th:value="${planDefinition.planDefinitionId()}"
                           th:id="${'pd-' + planDefinition.planDefinitionId()}" required
                           th:checked="${iter.first}"/>
                </td>
                <td>
                    <label th:for="${'pd-' + planDefinition.planDefinitionId()}" th:text="${planDefinition.label()}">Plan</label>
                </td>
                <td th:text="${planDefinition.lastUpdated() != null ? planDefinition.lastUpdated() : '-'}">-</td>
                <td>
                    <span th:if="${planDefinition.actionSummaries().isEmpty()}" class="pd-actions">none</span>
                    <ul th:unless="${planDefinition.actionSummaries().isEmpty()}" class="pd-actions"
                        style="margin:0; padding-left:1.2rem;">
                        <li th:each="actionSummary : ${planDefinition.actionSummaries()}" th:text="${actionSummary}"></li>
                    </ul>
                </td>
            </tr>
            </tbody>
        </table>
        <button type="submit" class="btn btn-primary">Create care plan</button>
    </form>

    <p th:if="${planDefinitions.isEmpty()}">No plan definitions found.</p>

    <p>
        <a th:href="@{/episodes/{id}(id=${episodeOfCareId})}">Back to episode</a>
    </p>
</main>
</body>
</html>
