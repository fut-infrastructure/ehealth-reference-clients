<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - Citizen">Citizen</title>
    <link rel="stylesheet" th:href="@{/css/calm.css}">
</head>
<body>
<header class="site-header">
    <div class="site-header-inner">
        <a th:href="@{/}" class="site-title">FUT Citizen</a>
        <nav class="site-nav"
             th:if="${#authentication != null and #authentication.principal != 'anonymousUser'}">
            <a th:href="@{/}" class="nav-tab">My week</a>
            <a th:href="@{/tasks}" class="nav-tab">Tasks</a>
            <a th:href="@{/me}" class="nav-tab">My profile</a>
        </nav>
        <div class="site-user">
            <span class="text-muted text-sm">reference client</span>
            <span th:if="${#authentication != null and #authentication.principal != 'anonymousUser'}"
                  class="text-sm"
                  title="Your FHIR user id from the NemLogin token; identifies you to the FUT services">
                <span class="text-muted">Signed in as</span>
                <span th:text="${#authentication.name}">user</span>
            </span>
            <form th:if="${#authentication != null and #authentication.principal != 'anonymousUser'}"
                  th:action="@{/logout}" method="post" style="margin:0">
                <button type="submit" class="btn btn-secondary">Log out</button>
            </form>
        </div>
    </div>
</header>
<main>
    <div class="container" layout:fragment="content">
        <!-- page content -->
    </div>
</main>
</body>
</html>
