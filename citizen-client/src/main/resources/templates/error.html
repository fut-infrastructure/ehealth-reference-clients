<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">
<head>
    <title>Error</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <h1>Something went wrong
            <span th:if="${status}" th:text="${' (' + status + ')'}" class="text-muted"></span>
        </h1>
        <p th:if="${message != null and message != 'No message available'}" th:text="${message}" class="text-sm text-muted"></p>
        <p th:if="${error}" th:text="${error}" class="text-sm text-muted"></p>
        <a th:href="@{/}" class="btn btn-secondary">Back to home</a>
    </div>
</div>
</body>
</html>
